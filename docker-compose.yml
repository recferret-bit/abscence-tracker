services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-absence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-absence}
      POSTGRES_DB: ${POSTGRES_DB:-absence}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-absence} -d ${POSTGRES_DB:-absence}"]
      interval: 5s
      timeout: 5s
      retries: 10

